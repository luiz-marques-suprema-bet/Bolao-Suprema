name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Node 22+ has native global WebSocket, required by @supabase/supabase-js
          # createClient (RealtimeClient) when the test suite imports src/lib/supabase.ts.
          # Node 20 lacks it and the supabase-importing tests fail to load.
          node-version: 22
          cache: npm
      - name: Install
        run: npm ci
      - name: Type-check
        run: npm run type-check
      - name: Test
        run: npm run test
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
